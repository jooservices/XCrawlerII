$(document).ready(function() {
    var days = $('.card-overview').length
    var win = $(window);
    var ended = false;

    function loadNextOverview(){
        $('#loading').show();
            days++;
            responded = false;
            $.ajax({
                type: 'get',
                data: {
                    'action': 'overview',
                    'currentdate': $('.card-overview:last').attr('data-date'),
                },
                url: '/more.php',
                dataType: 'html',
                success: function(html) {
                    $('#overview_list').append(html);
                    $('#loading').hide();
                    thumbnailDragscroll();
                    responded = true;
                },
                statusCode: {
                    404: function() {
                        responded = true;
                        ended = true;
                        $('#loading').hide();
                        thumbnailDragscroll();
                    }
                }
            });
    }
    $('#button-load-more').click(function(){
        $('#button-load-more').hide();
        loadMore = true;
        loadNextOverview();
    })
    win.scroll(function() {
        if ($(document).height() - win.height() > win.scrollTop()-10 && !ended && responded && loadMore) {
            loadNextOverview();
            console.log('load next');
        }
    });
});
